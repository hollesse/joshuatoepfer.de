---
layout: default
---
<article class="post">
  <header class="post__header">
    <h1 class="post__title">{{ page.title }}</h1>
    <div class="meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d.%m.%Y" }}</time>
      {% if page.canonical_url %}
      <span>— Ursprünglich auf <a href="{{ page.canonical_url }}" rel="noopener noreferrer">innoq.com</a></span>
      {% endif %}
    </div>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
