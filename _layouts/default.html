<!DOCTYPE html>
<html lang="de" data-mode="dark" data-accent="amber">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
  {% include head-canonical.html %}
  <script>
    // Apply persisted theme before paint to avoid flash.
    (function () {
      try {
        var saved = localStorage.getItem("jt-mode");
        var mode = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-mode", mode);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Zum Inhalt springen</a>
  <div class="jt">
    {% include topnav.html %}
    <main id="main">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/email-elements.js' | relative_url }}" defer></script>
  {% if page.layout == "blog" %}<script src="{{ '/assets/js/blog-filter.js' | relative_url }}" defer></script>{% endif %}
</body>
</html>
