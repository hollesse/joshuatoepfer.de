title: "Joshua Töpfer"
description: "Software-Entwickler. Ensemble Programming, ADHS in der IT, Software Craftsmanship."
url: "https://joshuatoepfer.de"
baseurl: ""

author:
  name: "Joshua Töpfer"
  email: "joshua.toepfer@innoq.com"

# Jekyll settings
markdown: kramdown
permalink: /posts/:year/:month/:day/:title/

# Sass / SCSS
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude design handoff & build/tooling artefacts from the generated site
exclude:
  - design_handoff_jekyll
  - README.md
  - Gemfile
  - Gemfile.lock
  - netlify.toml
  - .ruby-version
