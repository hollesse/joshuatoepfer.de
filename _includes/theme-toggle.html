{%- comment -%}
Sun/Moon button. The .sun icon is visible in dark mode; .moon in light mode.
CSS in _layout.scss handles visibility based on data-mode on <html>.
JS in /assets/js/theme-toggle.js toggles data-mode + persists to localStorage.
{%- endcomment -%}
<button
  type="button"
  class="theme-toggle"
  data-theme-toggle
  aria-label="Theme wechseln"
  title="Theme wechseln">
  <svg class="sun" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
    <circle cx="8" cy="8" r="2.8" />
    <line x1="8" y1="1.2" x2="8" y2="2.6" />
    <line x1="8" y1="13.4" x2="8" y2="14.8" />
    <line x1="1.2" y1="8" x2="2.6" y2="8" />
    <line x1="13.4" y1="8" x2="14.8" y2="8" />
    <line x1="3.2" y1="3.2" x2="4.2" y2="4.2" />
    <line x1="11.8" y1="11.8" x2="12.8" y2="12.8" />
    <line x1="3.2" y1="12.8" x2="4.2" y2="11.8" />
    <line x1="11.8" y1="4.2" x2="12.8" y2="3.2" />
  </svg>
  <svg class="moon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M13.5 9.5A5.5 5.5 0 1 1 6.5 2.5a4.5 4.5 0 0 0 7 7z" />
  </svg>
</button>
