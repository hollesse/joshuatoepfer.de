[build]
  command   = "bundle exec jekyll build"
  publish   = "_site"

[build.environment]
  RUBY_VERSION = "3.4.2"
  JEKYLL_ENV   = "production"

# Branch deploy settings (all non-main branches get a preview URL)
[context.branch-deploy]
  command = "bundle exec jekyll build"

[context.deploy-preview]
  command = "bundle exec jekyll build"

# Redirect rules — none yet; add here as the site grows
# [[redirects]]
#   from   = "/old-path"
#   to     = "/new-path"
#   status = 301
