- date: '2025-03-14'
  what: 'Die andere Art des Teamworks: Whole Team Ensemble Programming'
  where: BOB 2025
  city: Berlin
  status: past
  type: talk
  duration: 90
  abstract: 'Stell dir vor, das gesamte Team sitzt zusammen vor einem Bildschirm und arbeitet zusammen – einer tippt, der Rest diskutiert und entscheidet. Das klingt nach einer ungewöhnlichen, aber höchst effektiven Arbeitsweise: Whole Team Ensemble Programming. Diese Methode geht weit über Pair Programming hinaus und ermöglicht es dem gesamten Team, gemeinsam zu denken, zu lernen und zu entwickeln. Dabei wird das Silodenken durchbrochen, Wissensinseln werden beseitigt, und der Fokus liegt auf maximalem Team-Engagement und schnelleren, besseren Entscheidungen.


    In diesem Tutorial erfährst und erlebst du, was Ensemble Programming ausmacht und warum es Teams zu einer echten High-Performance-Einheit machen kann. Joshua Töpfer, der seit über vier Jahren Vollzeit in einem Ensemble arbeitet, teilt seine Erfahrungen, die Vor- und Nachteile der Methodik und gibt wertvolle Tipps, wie du dein eigenes Team auf Ensemble Programming vorbereiten kannst – egal ob vor Ort oder remote. Zudem werden wir ein Kata als Ensemble lösen.'
  source: innoq
  source_url: https://www.innoq.com/de/talks/2025/03/vortrag-whole-team-ensemble-programming/
