- date: '2024-11-14'
  what: We Don’t Talk About Bruno — The Open Source HTTP Client Alternative to Postman and Insomnia
  where: c't <webdev>
  city: Köln
  status: past
  type: talk
  duration: 45
  abstract: 'A reliable HTTP client is an indispensable tool in the everyday life of a web developer. These tools make it possible to efficiently test and manage API requests, significantly easing development and debugging processes. While Postman and Insomnia have been the preferred tools for these tasks in recent years, a new HTTP client is now gaining popularity: Bruno.


    Bruno distinguishes itself from Postman and Insomnia by its deliberate avoidance of cloud services, allowing for a completely offline-based usage. Bruno enables the storage and versioning of request collections using Git and its own Bru Markup Language, ensuring seamless team collaboration and easy tracking of changes. Compared to the established tools, Bruno is a lightweight and user-friendly alternative.


    In this talk, we will explore the functionality of Bruno in detail and experiment together to see how Bruno compares to Insomnia and Postman.'
  slides: https://res.cloudinary.com/innoq/image/upload/fl_attachment:we-don-t-talk-about-bruno-ct-webdev-2024-slides/v1/uploads-production/2zli409ad3p4q650avx2atfmg1q2?_a=BACMTiAE
  source: innoq
  source_url: https://www.innoq.com/de/talks/2024/11/we-don-t-talk-about-bruno-ct-webdev-2024/
