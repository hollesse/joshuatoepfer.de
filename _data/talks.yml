- date: '2026-03-10'
  what: Four Years, One Ensemble – Challenges, Aha Moments, and True Team Transformation
  where: Agile Meets Architecture
  city: Berlin
  status: past
  type: talk
  duration: 40
  abstract: 'Ensemble Programming is more than just a way of working – it’s a paradigm shift in team collaboration. In this talk, I’ll share my journey through four years of exclusively working with the Ensemble Programming methodology. Together, we’ll take a behind-the-scenes look: What were my biggest aha moments, and which challenges tested me the most?


    I’ll highlight the obvious benefits but also uncover hidden pitfalls, showing how teams – whether newcomers or seasoned pros – can enhance their collaboration. From overcoming initial hurdles to unexpected learning experiences, we’ll explore how this methodology transforms not just code but the team itself. Discover what I’ve learned and what even experienced teams often overlook.


    This talk is for anyone curious about Ensemble Programming or already practicing it and seeking fresh insights.'
  slides: https://res.cloudinary.com/innoq/image/upload/fl_attachment:four-years-one-ensemble-challenges-aha-moments-and-true-team-transformation-slides/v1/uploads-production/0juwsmmi0inhx157dfjzuwh5b0f6?_a=BACMTiAE
