  what: Architekturarbeit im Mob
  where: Software Architecture Summit 2024
  city: München
  status: past
  type: talk
  duration: 210
  abstract: 'Die Arbeit von Softwarearchitekten findet in klassisch aufgestellten Teams oft abseits der Entwicklungsarbeit statt - sowohl räumlich als auch zeitlich getrennt. Dass das auch anders geht, zeigen Niko und Joshua in ihrem Workshop. Sie arbeiten seit mehr als 3 Jahren in einem Remote Mob, in dem das ganze Team bei Bedarf die Rolle des Architekten einnimmt. So wird die Arbeit an Domänen- und Lösungsarchitektur genauso vom ganzen Team gemeinsam durchgeführt, wie die Entwicklung und der Betrieb der Lösungen. Wir möchten euch vorstellen, wie ein Mob funktioniert und welche Veränderungen die synchrone Zusammenarbeit bei Architektur-Methoden mit sich bringt und gemeinsam mit euch die Architekturarbeit im Mob einmal ausprobieren.


    Der Workshop ist für Einsteiger und Fortgeschrittene geeignet, die verwendeten Methoden werden vorab erklärt.'
