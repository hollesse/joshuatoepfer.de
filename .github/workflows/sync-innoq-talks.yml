name: Sync talks from INNOQ

# Weekly talks-sync workflow (infra-011). Scrapes
# https://www.innoq.com/de/talks/?all=true&by=joshua-toepfer (and any
# `<a rel=next>` follow-ups) plus each talk's detail page, then opens
# one draft PR per run with the merged `_data/talks.yml`.
#
# Sibling to:
# - .github/workflows/sync-innoq.yml      (article incremental, infra-004)
# - .github/workflows/backfill-innoq.yml  (article backfill, infra-005)
#
# All three workflows share the `sync-innoq` label so one filter shows
# everything coming from INNOQ. Branch namespace `sync/innoq-talks/<YYYY-MM-DD>`
# is distinct from the article workflows so the PR list stays readable.
#
# See:
# - ADR-0002 (canonical content sync strategy)
# - ADR-0006 (HTTP politeness + dual-workflow article pattern)
# - ADR-0007 (talks sync architecture, this file's canonical reference)
# - .github/scripts/sync_innoq_talks.py + innoq_talks.py + innoq_common.py

on:
  schedule:
    # Weekly, Sundays 04:00 UTC. Staggered an hour after the article
    # sync's daily 03:00 UTC slot so the two don't share a runner queue.
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, scrape + merge + log the diff but do not write talks.yml or close prior PRs."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync INNOQ talks → PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # innoq_common.py top-level-imports `markdownify` (article HTML→MD
        # converter, used by the sibling sync-innoq / backfill-innoq workflows).
        # Even though talks-sync doesn't call into the converter functionally,
        # importing innoq_common would fail without it on the runner. Match
        # the article workflows' install set so the three INNOQ workflows
        # stay consistent.
        run: pip install --quiet feedparser markdownify pyyaml beautifulsoup4

      - name: Run talks sync
        id: run-sync
        env:
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/sync_innoq_talks.py

      - name: Open / update PR
        if: ${{ inputs.dry_run != true && steps.run-sync.outputs.has_changes == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.run-sync.outputs.branch }}
          delete-branch: true
          draft: true
          title: ${{ steps.run-sync.outputs.pr_title }}
          body: ${{ steps.run-sync.outputs.pr_body }}
          labels: sync-innoq
          commit-message: |
            sync(innoq-talks): ${{ steps.run-sync.outputs.pr_title }}

            Auto-generated by .github/workflows/sync-innoq-talks.yml.
            See ADR-0007 for the talks-sync architecture.
          add-paths: |
            _data/talks.yml
